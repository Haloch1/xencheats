      /* ── Build flat topic list for navigation ── */
      const allTopics = [];
      categories.forEach(cat => {
        cat.products.forEach(prod => {
          prod.topics.forEach(topic => {
            allTopics.push({ category: cat.name, product: prod.name, slug: prod.slug, ...topic });
          });
        });
      });

      /* ── Render Sidebar ── */
      const sidebarNav = document.getElementById("sidebarNav");

      function buildSidebar(filter = "") {
        sidebarNav.innerHTML = "";
        const lf = filter.toLowerCase();

        categories.forEach(cat => {
          const filteredProducts = cat.products.filter(prod => {
            if (!lf) return true;
            if (prod.name.toLowerCase().includes(lf)) return true;
            if (cat.name.toLowerCase().includes(lf)) return true;
            return prod.topics.some(t => t.title.toLowerCase().includes(lf));
          });

          if (!filteredProducts.length) return;

          const catDiv = document.createElement("div");
          catDiv.className = "sidebar-category";

          const catHeader = document.createElement("div");
          catHeader.className = "sidebar-category-header";
          catHeader.innerHTML = `<span class="arrow">&#9660;</span><span class="cat-label">${cat.name}</span>`;
          catHeader.addEventListener("click", () => catDiv.classList.toggle("collapsed"));
          catDiv.appendChild(catHeader);

          const catBody = document.createElement("div");
          catBody.className = "sidebar-category-body";

          filteredProducts.forEach(prod => {
            const prodDiv = document.createElement("div");
            prodDiv.className = "sidebar-product";

            if (prod.topics.length > 1) {
              const prodHeader = document.createElement("div");
              prodHeader.className = "sidebar-product-header";
              prodHeader.innerHTML = `<span class="p-arrow">&#9660;</span>${prod.name}`;
              prodHeader.addEventListener("click", () => prodDiv.classList.toggle("collapsed"));
              prodDiv.appendChild(prodHeader);

              const prodBody = document.createElement("div");
              prodBody.className = "sidebar-product-body";

              prod.topics.forEach(topic => {
                const link = document.createElement("div");
                link.className = "sidebar-topic";
                link.textContent = topic.title;
                link.dataset.slug = prod.slug;
                link.dataset.topic = topic.title;
                link.addEventListener("click", () => showTopic(prod.slug, topic.title));
                prodBody.appendChild(link);
              });

              prodDiv.appendChild(prodBody);
            } else {
              const link = document.createElement("div");
              link.className = "sidebar-product-header";
              link.style.cursor = "pointer";
              link.innerHTML = prod.name;
              link.addEventListener("click", () => showTopic(prod.slug, prod.topics[0].title));
              prodDiv.appendChild(link);
            }

            catBody.appendChild(prodDiv);
          });

          catDiv.appendChild(catBody);
          sidebarNav.appendChild(catDiv);
        });
      }

      buildSidebar();

      /* ── Search ── */
      const searchInput = document.getElementById("docsSearch");
      searchInput.addEventListener("input", () => buildSidebar(searchInput.value));

      /* ── Show Topic ── */
      const contentTitle = document.getElementById("contentTitle");
      const contentBody = document.getElementById("contentBody");
      const contentNext = document.getElementById("contentNext");

      function showTopic(slug, topicTitle) {
        const idx = allTopics.findIndex(t => t.slug === slug && t.title === topicTitle);
        if (idx === -1) return;

        const topic = allTopics[idx];
        contentTitle.textContent = topic.title;
        contentBody.innerHTML = topic.content;

        // Next button
        if (idx < allTopics.length - 1) {
          const next = allTopics[idx + 1];
          contentNext.innerHTML = `
            <div class="docs-next" onclick="window.__showTopic('${next.slug}', '${next.title.replace(/'/g, "\\'")}')">
              <div>
                <div class="docs-next-label">Next</div>
                <div class="docs-next-title">${next.title}</div>
              </div>
              <div class="docs-next-arrow">&#10095;</div>
            </div>
          `;
        } else {
          contentNext.innerHTML = "";
        }

        // Update active state in sidebar
        document.querySelectorAll(".sidebar-topic").forEach(el => el.classList.remove("active"));
        const activeLink = document.querySelector(`.sidebar-topic[data-slug="${slug}"][data-topic="${topicTitle}"]`);
        if (activeLink) {
          activeLink.classList.add("active");
          activeLink.scrollIntoView({ block: "nearest" });
        }

        // Update URL hash
        history.replaceState(null, "", `#${slug}/${encodeURIComponent(topicTitle)}`);

        // Close mobile sidebar
        document.getElementById("docsSidebar").classList.remove("open");

        // Scroll to top of content
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      window.__showTopic = showTopic;

      /* ── Handle hash on load ── */
      function loadFromHash() {
        const hash = location.hash.slice(1);
        if (!hash) {
          // Show first topic by default
          if (allTopics.length) showTopic(allTopics[0].slug, allTopics[0].title);
          return;
        }

        const parts = hash.split("/");
        const slug = parts[0];
        const topicTitle = parts[1] ? decodeURIComponent(parts[1]) : null;

        if (topicTitle) {
          const found = allTopics.find(t => t.slug === slug && t.title === topicTitle);
          if (found) { showTopic(slug, topicTitle); return; }
        }

        // Fall back to first topic of that product
        const first = allTopics.find(t => t.slug === slug);
        if (first) showTopic(first.slug, first.title);
        else if (allTopics.length) showTopic(allTopics[0].slug, allTopics[0].title);
      }

      loadFromHash();
      window.addEventListener("hashchange", loadFromHash);

      /* ── Mobile toggle ── */
      document.getElementById("mobileToggle").addEventListener("click", () => {
        document.getElementById("docsSidebar").classList.toggle("open");
      });

      document.getElementById("docsOverlay").addEventListener("click", () => {
        document.getElementById("docsSidebar").classList.remove("open");
      });
    </script>
