<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/assets/favicon.ico" sizes="16x16 32x32 48x48 64x64" />
    <link rel="icon" type="image/png" href="/assets/hc-logo.png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <title>Payment Cancelled | Halo Cheats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Oxanium:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-inner">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <main class="section checkout-state">
        <div class="auth-card auth-card-dashboard">
          <p class="eyebrow">Checkout cancelled</p>
          <h2>No payment was completed.</h2>
          <div class="inline-message warn">
            The Stripe page was closed or cancelled before payment finished. You can go back to products and try again.
          </div>
          <div class="dashboard-actions">
            <a class="button button-primary" href="/products/">Back To Products</a>
            <a class="button button-secondary" href="/account/">Open Account</a>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
