<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/hc-logo.png" />
    <title>Order Complete | Halo Cheats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Oxanium:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
    <style>
      .order-result {
        text-align: center;
        padding: 20px 0;
      }
      .order-result h2 {
        margin-bottom: 8px;
      }
      .order-result .order-subtitle {
        color: var(--muted);
        margin-bottom: 24px;
      }
      .key-display {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin: 20px 0;
      }
      .key-display .key-label {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .key-display .key-value {
        font-family: "Oxanium", monospace;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.08em;
        word-break: break-all;
        user-select: all;
      }
      .key-display .copy-btn {
        margin-top: 12px;
        background: var(--accent);
        color: #000;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        transition: opacity 0.2s;
      }
      .key-display .copy-btn:hover {
        opacity: 0.85;
      }
      .order-meta {
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 16px;
      }
      .order-meta span {
        display: block;
        margin-bottom: 4px;
      }
      .loading-spinner {
        color: var(--muted);
        padding: 40px 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="page-shell page-shell-inner">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <main class="section checkout-state">
        <div class="auth-card auth-card-dashboard" id="orderCard">
          <div class="loading-spinner" id="orderLoading">Verifying your payment...</div>
          <div id="orderContent" style="display:none;"></div>
        </div>
      </main>
    </div>

    <script type="module" src="../../scripts/checkout-page.js"></script>
  </body>
</html>
