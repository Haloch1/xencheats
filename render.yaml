services:
  - type: web
    name: halo-cheats
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: BASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_SIGNUP_WEBHOOK_URL
        sync: false
      - key: DISCORD_SECURITY_WEBHOOK_URL
        sync: false
      - key: DISCORD_LIVE_DESK_MENTION
        sync: false
      - key: ADMIN_ACCESS_KEY
        sync: false
      - key: OWNER_REQUESTS_KEY
        sync: false
