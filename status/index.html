  <body>
    <div class="page-shell page-shell-inner">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <header class="topbar reveal" data-delay="0">
        <div class="topbar-shell">

              <strong>Halo Cheats</strong>

            </div>
          </a>

          <nav class="nav">
            <a href="/">Home</a>
            <a href="/products/">Products</a>
            <a href="/reviews/">Reviews</a>
            <a href="/desk/">Desk Help</a>
            <a href="https://discord.gg/qHnjHFWwBv" target="_blank" class="nav-discord" aria-label="Discord"><svg width="20" height="15" viewBox="0 0 71 55" fill="currentColor"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.4.2a.2.2 0 0 0-.2.1 40.8 40.8 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0A37.4 37.4 0 0 0 25.4.3a.2.2 0 0 0-.2-.1A58.4 58.4 0 0 0 10.5 4.9a.2.2 0 0 0-.1.1C1.5 18.7-.9 32.2.3 45.5v.2a58.9 58.9 0 0 0 17.7 9a.2.2 0 0 0 .3-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.8 38.8 0 0 1-5.5-2.6.2.2 0 0 1 0-.4l1.1-.9a.2.2 0 0 1 .2 0 42 42 0 0 0 35.6 0 .2.2 0 0 1 .2 0l1.1.9a.2.2 0 0 1 0 .4 36.4 36.4 0 0 1-5.5 2.6.2.2 0 0 0-.1.3 47.2 47.2 0 0 0 3.6 5.9.2.2 0 0 0 .3.1A58.7 58.7 0 0 0 70.5 45.7v-.2c1.4-15-2.3-28.4-9.9-40.1a.2.2 0 0 0-.1-.1h-.4ZM23.7 37.3c-3.5 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.2 6.3 7-2.8 7-6.3 7Zm23.3 0c-3.5 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.2 6.3 7-2.8 7-6.3 7Z"/></svg> Discord</a>
          </nav>

          <a class="nav-cta" href="/account/">Account</a>

      </header>

      <main class="section">
        <div class="section-heading reveal" data-delay="10">
          <p class="eyebrow">Status</p>
          <h2>Product Status</h2>
          <p>Live detection status for all supported products.</p>
        </div>

        <section class="status-board reveal" data-delay="45" id="statusBoard">
          <div class="status-loading" style="text-align:center;padding:40px;color:var(--muted);">Loading status...</div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <div class="footer-brand">
            <img src="../assets/hc-logo.png" alt="Halo Cheats logo" />
            <strong>Halo Cheats</strong>
          </div>
          <div class="footer-links">
            <a href="/products/">Products</a>
            <a href="/instructions/">Instructions</a>
            <a href="/status/">Status</a>
            <a href="/desk/">Desk Help</a>
            <a href="/terms/">Terms</a>
            <a href="/privacy/">Privacy</a>
            <a href="https://discord.gg/qHnjHFWwBv" target="_blank">Discord</a>
            <a href="https://www.tiktok.com/@halo.cheats" target="_blank">TikTok</a>
          </div>
          <div class="footer-copy">&copy; 2025 Halo Cheats. All rights reserved.</div>
        </div>
      </footer>
    </div>

    <script type="module">
      import { initReveal } from "../scripts/site.js";
      initReveal();

      const board = document.getElementById("statusBoard");

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function chipClass(status) {
        const s = String(status || "").toLowerCase();
        if (s === "undetected" || s === "online") return "member-chip-undetected";
        if (s === "updating" || s === "maintenance") return "member-chip-updating";
        if (s === "detected" || s === "offline") return "member-chip-detected";
        if (s === "listed") return "member-chip-listed";
        return "member-chip-listed";
      }

      async function loadStatus() {
        try {
          const res = await fetch("/api/status");
          if (!res.ok) throw new Error("Failed to fetch");
          const categories = await res.json();

          if (!categories.length) {
            board.innerHTML = `<p style="text-align:center;color:var(--muted);padding:40px;">No status data available right now.</p>`;
            return;
          }

          board.innerHTML = categories.map(cat => {
            const isWide = cat.products.length > 4;
            return `
              <article class="status-group${isWide ? " status-group-wide" : ""}">
                <div class="member-panel-heading">
                  <p class="eyebrow">${esc(cat.name)}</p>
                </div>
                <div class="member-list${isWide ? " status-list-split" : ""}">
                  ${cat.products.map(p => `
                    <div class="member-item status-item">
                      <strong>${esc(p.name)}</strong>
                      <span class="member-chip ${chipClass(p.status)}">${esc(p.status)}</span>
                    </div>
                  `).join("")}
                </div>
              </article>
            `;
          }).join("");

          initReveal();
        } catch (err) {
          board.innerHTML = `<p style="text-align:center;color:var(--accent);padding:40px;">Could not load status. Try again later.</p>`;
        }
      }

      loadStatus();
    </script>
  </body>
</html>
