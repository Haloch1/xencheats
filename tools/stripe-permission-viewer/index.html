<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stripe Restricted-Key Permission Viewer</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #080b11; color: #edf2ff; }
      * { box-sizing: border-box; }
      body { margin: 0; padding: 34px 18px; }
      main { width: min(800px, 100%); margin: auto; }
      h1 { margin-bottom: 7px; }
      .muted { color: #9aa6bc; }
      .card { margin-top: 22px; padding: 20px; border: 1px solid #283146; border-radius: 14px; background: #111722; }
      label { display: block; color: #cbd5e1; }
      input { width: 100%; margin-top: 8px; padding: 12px; border: 1px solid #3a455e; border-radius: 9px; background: #090d15; color: white; }
      button { margin-top: 14px; padding: 11px 17px; border: 0; border-radius: 9px; background: #635bff; color: white; font-weight: 700; cursor: pointer; }
      button:disabled { opacity: .5; cursor: wait; }
      table { width: 100%; margin-top: 18px; border-collapse: collapse; }
      th, td { padding: 11px 8px; border-bottom: 1px solid #283146; text-align: left; }
      td { vertical-align: top; }
      pre { max-width: 430px; max-height: 260px; overflow: auto; padding: 10px; border-radius: 8px; background: #080b11; white-space: pre-wrap; word-break: break-word; }
      summary { cursor: pointer; color: #a5b4fc; }
      .allowed { color: #6ee7b7; }
      .denied { color: #fca5a5; }
      .unavailable { color: #fcd34d; }
      .likely_allowed { color: #6ee7b7; }
      .hidden { display: none; }
      .notice { margin-top: 16px; padding: 13px; border-radius: 9px; background: #1b2230; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <main>
      <h1>Stripe Restricted-Key Permission Viewer</h1>
      <p class="muted">Local, read-only checks across Stripe's major API resources for an <code>rk_live_…</code> or <code>rk_test_…</code> key. The key is held in memory and is not saved.</p>

      <section class="card">
        <label>Restricted key<input id="key" type="password" autocomplete="off" spellcheck="false" placeholder="rk_live_…" /></label>
        <button id="inspect">Inspect read access</button>
        <button id="refundCheck" type="button">Check refund write access</button>
        <span id="status" class="muted" style="margin-left:12px"></span>
        <div id="refundResult" class="notice hidden"></div>
      </section>

      <section id="output" class="card hidden">
        <h2 id="mode"></h2>
        <div id="note" class="notice"></div>
        <button id="download" type="button">Download redacted JSON</button>
        <table>
          <thead><tr><th>Stripe resource</th><th>Read access</th><th>Output</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script>
      const token = "__APP_TOKEN__";
      const key = document.getElementById("key");
      const button = document.getElementById("inspect");
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      const download = document.getElementById("download");
      const refundCheck = document.getElementById("refundCheck");
      const refundResult = document.getElementById("refundResult");
      let latestOutput = null;

      if (location.protocol === "file:") {
        button.disabled = true;
        refundCheck.disabled = true;
        status.textContent = "Open View Stripe Key Permissions.cmd instead of this HTML file.";
      }

      button.addEventListener("click", async () => {
        button.disabled = true;
        output.classList.add("hidden");
        status.textContent = "Running read-only checks…";
        try {
          const response = await fetch("/api/inspect", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-Permission-Viewer-Token": token },
            body: JSON.stringify({ key: key.value }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Inspection failed.");

          document.getElementById("mode").textContent = `${data.mode.toUpperCase()} restricted key`;
          document.getElementById("note").textContent = data.note;
          latestOutput = data;
          const rows = document.getElementById("rows");
          rows.replaceChildren();
          for (const item of data.results) {
            const row = document.createElement("tr");
            const resourceCell = document.createElement("td");
            const accessCell = document.createElement("td");
            const outputCell = document.createElement("td");
            resourceCell.textContent = item.resource;
            accessCell.textContent = item.readAccess;
            accessCell.className = item.readAccess;
            if (item.output !== undefined) {
              const details = document.createElement("details");
              const summary = document.createElement("summary");
              const preview = document.createElement("pre");
              summary.textContent = "View redacted output";
              preview.textContent = JSON.stringify(item.output, null, 2);
              details.append(summary, preview);
              outputCell.append(details);
            } else {
              outputCell.textContent = item.detail || "No output returned.";
              outputCell.className = "muted";
            }
            row.append(resourceCell, accessCell, outputCell);
            rows.append(row);
          }
          output.classList.remove("hidden");
          status.textContent = "Inspection complete.";
        } catch (error) {
          status.textContent = error.message === "Failed to fetch"
            ? "The local viewer stopped. Keep the launcher window open and run View Stripe Key Permissions.cmd again."
            : error.message;
        } finally {
          button.disabled = false;
        }
      });

      refundCheck.addEventListener("click", async () => {
        refundCheck.disabled = true;
        refundResult.classList.add("hidden");
        status.textContent = "Checking refund endpoint access…";
        try {
          const response = await fetch("/api/check-refund-write", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-Permission-Viewer-Token": token },
            body: JSON.stringify({ key: key.value }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Refund check failed.");
          refundResult.textContent = `${data.status}: ${data.detail}`;
          refundResult.className = `notice ${data.status}`;
          status.textContent = "Refund permission check complete. No refund was created.";
        } catch (error) {
          status.textContent = error.message === "Failed to fetch"
            ? "The local viewer stopped. Keep the launcher window open and run it again."
            : error.message;
        } finally {
          refundCheck.disabled = false;
        }
      });

      download.addEventListener("click", () => {
        if (!latestOutput) return;
        const blob = new Blob([JSON.stringify(latestOutput, null, 2)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `stripe-read-output-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(link.href);
      });
    </script>
  </body>
</html>
