<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/hc-logo.png" />
    <title>Secure Panel | Halo Cheats</title>
    <meta
      name="description"
      content="Halo Cheats secure owner panel."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Oxanium:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-inner">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <main class="section admin-shell">
        <div class="section-heading reveal" data-delay="0">
          <p class="eyebrow">Secure panel</p>
          <h2>Enter code.</h2>
          <p>Authorized access only.</p>
        </div>

        <div class="inline-message info reveal" data-delay="20" data-analytics-message>
          Enter code
        </div>

        <section class="admin-access-card reveal" data-delay="40">
          <form class="auth-form admin-access-form" data-analytics-access-form>
            <label>
              Code
              <input type="password" name="ownerKey" autocomplete="current-password" required />
            </label>
            <button class="button button-primary" type="submit">Enter Code</button>
          </form>
        </section>

        <section class="analytics-shell reveal" data-delay="60" data-analytics-shell hidden>
          <div class="analytics-hero-card">
            <p class="eyebrow">Live now</p>
            <strong data-active-visitors>0</strong>
            <span data-active-window>Active in the last 75 seconds</span>
          </div>

          <div class="desk-thread-panel analytics-breakdown">
            <div class="desk-thread-panel-header">
              <div>
                <p class="eyebrow">Pages</p>
                <h3>Current page activity</h3>
              </div>
              <small data-analytics-updated>Not loaded yet</small>
            </div>
            <div class="request-list" data-page-activity-list>
              <div class="member-empty">No live visitors yet.</div>
            </div>
          </div>

          <div class="desk-thread-panel analytics-breakdown analytics-log-panel">
            <div class="desk-thread-panel-header">
              <div>
                <p class="eyebrow">View log</p>
                <h3>Recent real browser views</h3>
              </div>
              <small>Owner-only request log</small>
            </div>
            <div class="request-list" data-visitor-view-list>
              <div class="member-empty">No page views logged yet.</div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="../scripts/analytics-page.js"></script>
  </body>
</html>
