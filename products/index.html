<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/hc-logo.png" />
    <title>Products | Halo Cheats</title>
    <meta
      name="description"
      content="Browse the Halo Cheats partner lineup, open checkout, and pay through Stripe after signing into your member account."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Oxanium:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-inner">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <header class="topbar reveal" data-delay="0">
        <div class="topbar-shell">
          <a class="brand" href="/" aria-label="Halo Cheats home">
            <img src="../assets/hc-logo.png" alt="Halo Cheats logo" />
            <div>
              <strong>Halo Cheats</strong>
              <span>Authorized Cheats</span>
            </div>
          </a>

          <nav class="nav">
            <a href="/">Home</a>
            <a href="/status/">Status</a>
            <a href="/desk/">Desk Help</a>
          </nav>

          <a class="nav-cta" data-account-link href="/account/">Account</a>
        </div>
      </header>

      <main class="section">
        <div class="section-heading products-heading reveal" data-delay="10">
          <p class="eyebrow">Products</p>
          <h2>Browse the full partner catalog.</h2>
        
        </div>

        <section class="catalog-panel reveal" data-delay="35">
          <div class="catalog-stat">
            <span>Games</span>
            <strong data-catalog-games>0</strong>
          </div>
          <div class="catalog-stat">
            <span>Listings</span>
            <strong data-catalog-products>0</strong>
          </div>
          <div class="catalog-stat">
            <span>Lowest Entry</span>
            <strong data-catalog-lowest>$0</strong>
          </div>
          <div class="catalog-stat">
            <span>Checkout</span>
            <strong>Stripe</strong>
          </div>
        </section>

        <div class="inline-message info products-message" data-products-message hidden></div>

        <section class="product-controls reveal" data-delay="45">
          <label class="product-search">
            <span>Search products</span>
            <input type="search" placeholder="Search products..." data-product-search />
          </label>
        </section>

        <section class="category-strip reveal" data-delay="55" data-category-strip></section>

        <section class="catalog-groups" data-products-grid></section>
      </main>
    </div>

    <script type="module" src="../scripts/products-page.js"></script>
  </body>
</html>
